    d="M35 70 H65" 
    stroke="#f43f5e" 
    stroke-width="4" 
    stroke-linecap="round" 
  />
  
  {/* Nodes */}
  <circle cx="50" cy="15" r="3.5" fill="white" />
  <circle cx="15" cy="85" r="3.5" fill="white" />
  <circle cx="85" cy="85" r="3.5" fill="white" />
  <circle cx="50" cy="40" r="3.5" fill="white" />
